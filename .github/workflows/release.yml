name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build module
        run: npm run build

      - name: Build release bundle
        run: npm run release:build -- "${RELEASE_TAG}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: dist/release/release-notes.md
          files: |
            dist/release/side-initiative/module.json
            dist/release/side-initiative-${{ env.RELEASE_TAG }}.zip
      - name: Publish to Foundry VTT package registry
        env:
          FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
        run: |
          if [ -z "$FOUNDRY_RELEASE_TOKEN" ]; then
            echo "FOUNDRY_RELEASE_TOKEN is not set; skipping Foundry package publish."
            exit 0
          fi
          npm run release:publish -- "${RELEASE_TAG}"
